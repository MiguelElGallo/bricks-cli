# Zensical configuration for the bricks-cli documentation site.
# Built by the creators of Material for MkDocs — https://zensical.org/
#
# This site is structured with the Diataxis framework (https://diataxis.fr/):
# Tutorials, How-to guides, Reference, and Explanation. The tutorials are
# written in the style of the FastAPI docs (https://fastapi.tiangolo.com/).

[project]

site_name = "bricks-cli"
site_description = "Deploy and observe a dbt Core project on Azure Databricks with Declarative Automation Bundles."
site_author = "bricks-cli contributors"

# GitHub Pages project URL. Asset links are relative, so the project subpath
# (/bricks-cli/) resolves correctly. This is the public GitHub repo URL — it is
# not a Databricks workspace or Microsoft Entra identifier.
site_url = "https://miguelelgallo.github.io/bricks-cli/"

repo_url = "https://github.com/MiguelElGallo/bricks-cli"
repo_name = "MiguelElGallo/bricks-cli"
edit_uri = "edit/main/docs/"

copyright = """
Copyright &copy; 2026 bricks-cli contributors
"""

# Diataxis navigation. Each top-level entry is a Diataxis quadrant.
nav = [
  { "bricks-cli" = "index.md" },
  { "Tutorial - User Guide" = [
      { "Tutorial - User Guide" = "tutorials/index.md" },
      { "Install the Databricks CLI" = "tutorials/install-the-cli.md" },
      { "Connect to Databricks" = "tutorials/connect-to-databricks.md" },
      { "Explore the dbt project" = "tutorials/explore-the-project.md" },
      { "Deploy and run the job" = "tutorials/deploy-and-run.md" },
  ]},
  { "How-to guides" = [
      { "How-to guides" = "how-to/index.md" },
      { "Run dbt locally" = "how-to/run-dbt-locally.md" },
      { "Add a dbt model" = "how-to/add-a-model.md" },
      { "Observe dbt jobs" = "how-to/observe-dbt-jobs.md" },
      { "Set up secretless CI/CD with OIDC" = "how-to/set-up-oidc-cicd.md" },
      { "Deploy to production" = "how-to/deploy-to-production.md" },
  ]},
  { "Reference" = [
      { "Reference" = "reference/index.md" },
      { "CLI commands" = "reference/cli-commands.md" },
      { "Bundle configuration" = "reference/bundle-config.md" },
      { "The dbt job resources" = "reference/job-resource.md" },
      { "Configuration values" = "reference/configuration-values.md" },
      { "Project layout" = "reference/project-layout.md" },
  ]},
  { "Explanation" = [
      { "Explanation" = "explanation/index.md" },
      { "Why Declarative Automation Bundles" = "explanation/why-asset-bundles.md" },
      { "The authentication model" = "explanation/authentication.md" },
      { "How dbt connects to Databricks" = "explanation/how-dbt-connects.md" },
      { "Keeping secrets out of git" = "explanation/security-and-secrets.md" },
  ]},
]

[project.theme]
# "modern" (default) or "classic" (traditional Material for MkDocs look).

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
logo = "lucide/database"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/MiguelElGallo/bricks-cli"

# Markdown extensions — these power the admonitions ("tip"/"info"/"warning"),
# code annotations, content tabs, and mermaid diagrams used throughout the site.
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
