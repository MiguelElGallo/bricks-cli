name: Docs

# Build the Zensical documentation site and publish it to GitHub Pages.
# Pages must be configured to deploy from "GitHub Actions" (Settings -> Pages).
# The docs build only from the Markdown sources under docs/ and the Zensical
# config, so this workflow needs no Databricks access.

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "zensical.toml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Zensical
        run: pip install -r requirements-docs.txt
      - name: Build the site (strict)
        run: zensical build --clean --strict
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
