# Deploy the bundle to the prod target on merge to main, then run the dbt job.
#
# Secretless auth via GitHub OIDC federation (see docs/how-to/set-up-oidc-cicd.md).
# The `environment: prod` gate lets you require manual approval and scope the
# federation policy subject to `repo:<owner>/<repo>:environment:prod`.
name: Deploy bundle (prod)

concurrency: deploy-prod

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # required to mint the GitHub OIDC token
  contents: read

env:
  DATABRICKS_AUTH_TYPE: github-oidc
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}  # service principal UUID (not a secret)
  # Workspace-specific values are GitHub repo/environment Variables, never
  # committed. They fill the bundle variables of the same name.
  BUNDLE_VAR_warehouse_id: ${{ vars.DATABRICKS_WAREHOUSE_ID }}
  BUNDLE_VAR_catalog: ${{ vars.DATABRICKS_CATALOG }}
  BUNDLE_VAR_schema: ${{ vars.DATABRICKS_SCHEMA }}

jobs:
  deploy:
    name: Deploy and run (prod)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@v1.5.0
        with:
          version: 1.5.0

      # validate is also run implicitly by deploy; kept explicit for clear logs.
      - name: Validate
        run: databricks bundle validate --target prod

      - name: Deploy
        run: databricks bundle deploy --target prod

      # Execute the dbt job once (seed -> table -> test) to verify the deploy.
      - name: Run dbt job
        run: databricks bundle run nyc_taxi_dbt_job --target prod
