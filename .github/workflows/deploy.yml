# Deploy the bundle to the prod target on merge to main, then run both jobs.
#
# This personal Free Edition workspace has no account-level APIs, so GitHub
# federation policies are unavailable. The protected prod environment holds a
# rotating Databricks OAuth M2M secret for the deployment service principal.
name: Deploy bundle (prod)

concurrency: deploy-prod

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  DATABRICKS_AUTH_TYPE: oauth-m2m
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
  # Workspace-specific values come from GitHub repository Variables. They fill
  # the bundle variables of the same name.
  BUNDLE_VAR_warehouse_id: ${{ vars.DATABRICKS_WAREHOUSE_ID }}
  BUNDLE_VAR_catalog: ${{ vars.DATABRICKS_CATALOG }}
  BUNDLE_VAR_schema: ${{ vars.DATABRICKS_SCHEMA }}
  BUNDLE_VAR_prod_deployer_service_principal_name: ${{ vars.DATABRICKS_CLIENT_ID }}
  BUNDLE_VAR_prod_run_as_service_principal_name: ${{ vars.DATABRICKS_RUN_AS_SERVICE_PRINCIPAL_NAME }}
  BUNDLE_VAR_prod_collector_service_principal_name: ${{ vars.DATABRICKS_COLLECTOR_SERVICE_PRINCIPAL_NAME }}

jobs:
  deploy:
    name: Deploy and run (prod)
    runs-on: ubuntu-latest
    environment: prod
    env:
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@v1.7.0
        with:
          version: 1.7.0

      # validate is also run implicitly by deploy; kept explicit for clear logs.
      - name: Validate
        run: databricks bundle validate --target prod

      - name: Deploy
        run: databricks bundle deploy --target prod

      # Keep production code writable only by the deployer. The source identity
      # can read the dbt project; the collector can run its notebook but cannot
      # edit or manage any deployed file.
      - name: Grant run identities access to deployed files
        run: |
          set -euo pipefail
          bundle_files=$(databricks bundle summary --target prod --output json | jq -er '.workspace.file_path')
          object_id=$(databricks workspace get-status "$bundle_files" --output json | jq -er '.object_id')
          acl=$(jq -cn \
            --arg runner "$BUNDLE_VAR_prod_run_as_service_principal_name" \
            --arg collector "$BUNDLE_VAR_prod_collector_service_principal_name" \
            '{access_control_list: [
              {service_principal_name: $runner, permission_level: "CAN_READ"},
              {service_principal_name: $collector, permission_level: "CAN_RUN"}
            ]}')
          databricks permissions update directories "$object_id" --json "$acl"

      # Run one dbt build, then sweep its staged artifacts into governed
      # evidence and sanitized observability facts as the post-deploy check.
      - name: Run dbt build and artifact collector
        run: |
          databricks bundle run nyc_taxi_dbt_job --target prod
          databricks bundle run dbt_observability_collector_job --target prod
