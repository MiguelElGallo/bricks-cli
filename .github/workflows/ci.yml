# CI: validate code and the dbt graph on every pull request without exposing a
# reusable Databricks credential to pull-request code. Bundle validation is
# workspace-aware, so it runs against the real workspace in the protected prod
# deployment workflow after merge.
name: CI

concurrency: ci-${{ github.ref }}

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DO_NOT_TRACK: "1"

jobs:
  validate:
    name: Validate code and dbt graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install development dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Type check
        run: ty check

      - name: Unit tests
        run: pytest

      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation (strict)
        run: zensical build --clean --strict

      # Parse and enumerate the dbt graph without contacting Databricks. The
      # local profile requires connection-shaped values even for offline work.
      - name: Validate dbt project offline
        env:
          DBT_HOST: adb-ci.invalid
          DBT_HTTP_PATH: /sql/1.0/warehouses/0000000000000000
          DBT_CATALOG: ci_catalog
          DBT_SCHEMA: ci_schema
          DBT_ACCESS_TOKEN: ci-placeholder
        run: |
          dbt parse --no-partial-parse --profiles-dir dbt_profiles --target dev
          dbt list --profiles-dir dbt_profiles --target dev --output name
