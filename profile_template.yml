# Prompts (with hints) used by `dbt init` to create your *local* profile in
# ~/.dbt/profiles.yml. The deployed job does not use this — it gets the
# warehouse, catalog and schema from the job's dbt task (see resources/).
# It collects these values interactively when you run `dbt init`.
fixed:
  type: databricks
prompts:
  host:
    hint: 'workspace host, e.g. dbc-XXXXXXXX-XXXX.cloud.databricks.com'
  token:
    hint: 'short-lived access token from `databricks auth token <profile> --output json`'
    hide_input: true
  http_path:
    hint: 'HTTP path of SQL warehouse, e.g. /sql/1.0/warehouses/XXXXXXXXXXXXXXXX'
  catalog:
    hint: 'initial catalog'
  schema:
    hint: 'default schema where dbt will build objects'
    default: dbt_nyc_taxi
  threads:
    hint: 'threads to use during development, 1 or more'
    type: 'int'
    default: 4
